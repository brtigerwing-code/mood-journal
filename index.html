<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Journal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:sans-serif;
padding:20px;
max-width:500px;
margin:auto;
}

textarea{
width:100%;
height:100px;
}

button{
padding:10px;
margin-top:10px;
width:100%;
}

.entry{
border-bottom:1px solid #ccc;
margin-top:10px;
padding-bottom:10px;
}
</style>
</head>

<body>

<h2>今の気分は？</h2>

<div style="display:flex;justify-content:space-between;align-items:center;">
<button onclick="changeDate(-1)">←</button>
<span id="currentDateLabel"></span>
<button onclick="changeDate(1)">→</button>
</div>

<input type="range" min="1" max="7" value="4" id="moodSlider">
<p>気分スコア: <span id="moodValue">4</span></p>

<p id="prompt"></p>

<textarea id="textInput" placeholder="感じたことを自由に書いてください（任意）"></textarea>

<button onclick="saveEntry()">保存</button>

<h3>気分の推移（30日）</h3>
<canvas id="moodChart" height="200"></canvas>

<h3>記録一覧</h3>
<div id="entries"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const prompts=[
"今日いちばん印象に残ったことは？",
"今の気分の原因は？",
"体調はどう？",
"誰とのやり取りが心に残った？",
"今日食べたものは？"
];

let currentDate=new Date();
let chartInstance;

const slider=document.getElementById("moodSlider");
const moodValue=document.getElementById("moodValue");
const promptText=document.getElementById("prompt");

moodValue.textContent=slider.value;
promptText.textContent=prompts[Math.floor(Math.random()*prompts.length)];

slider.oninput=function(){
moodValue.textContent=this.value;
};

function updateDateLabel(){
document.getElementById("currentDateLabel").textContent=
currentDate.toLocaleDateString();
}

function changeDate(offset){
currentDate.setDate(currentDate.getDate()+offset);
updateDateLabel();
loadEntries();
drawChart();
}

function saveEntry(){

const mood=Number(slider.value);
const text=document.getElementById("textInput").value;

const entry={
timestamp:Date.now(),
mood:mood,
text:text
};

let entries=JSON.parse(localStorage.getItem("journalEntries"))||[];

entries.push(entry);

localStorage.setItem("journalEntries",JSON.stringify(entries));

document.getElementById("textInput").value="";

loadEntries();
drawChart();
}

function deleteEntry(index){

let entries=JSON.parse(localStorage.getItem("journalEntries"))||[];

entries.splice(index,1);

localStorage.setItem("journalEntries",JSON.stringify(entries));

loadEntries();
drawChart();
}

function loadEntries(){

const container=document.getElementById("entries");
container.innerHTML="";

const entries=JSON.parse(localStorage.getItem("journalEntries"))||[];

const grouped={};

entries.forEach((entry,index)=>{

const date=new Date(entry.timestamp).toLocaleDateString();

if(!grouped[date]){
grouped[date]=[];
}

grouped[date].push({...entry,index});

});

const sortedDates=Object.keys(grouped).sort((a,b)=>new Date(a)-new Date(b));

sortedDates.forEach(date=>{

const dateDiv=document.createElement("div");
dateDiv.innerHTML="<h4>"+date+"</h4>";
container.appendChild(dateDiv);

grouped[date].forEach(entry=>{

const div=document.createElement("div");
div.className="entry";

const time=new Date(entry.timestamp).toLocaleTimeString();

div.innerHTML=
"<strong>"+time+"</strong><br>"+
"気分: "+entry.mood+"<br>"+
(entry.text||"")+
"<br><button onclick='deleteEntry("+entry.index+")'>削除</button>";

container.appendChild(div);

});

});

}

function drawChart(){

const entries=JSON.parse(localStorage.getItem("journalEntries"))||[];

const dailyData={};

entries.forEach(entry=>{

const date=new Date(entry.timestamp).toLocaleDateString();

if(!dailyData[date]){
dailyData[date]=[];
}

dailyData[date].push(entry.mood);

});

const labels=[];
const moods=[];

for(let i=29;i>=0;i--){

const d=new Date();
d.setDate(d.getDate()-i);

const label=d.toLocaleDateString();

labels.push(label);

if(dailyData[label]){

const avg=dailyData[label].reduce((a,b)=>a+b,0)/dailyData[label].length;
moods.push(avg);

}else{

moods.push(null);

}

}

const movingAverage=moods.map((_,i,arr)=>{

const start=Math.max(0,i-6);
const subset=arr.slice(start,i+1).filter(v=>v!==null);

if(subset.length===0) return null;

const sum=subset.reduce((a,b)=>a+b,0);

return sum/subset.length;

});

const ctx=document.getElementById("moodChart").getContext("2d");

if(chartInstance){
chartInstance.destroy();
}

chartInstance=new Chart(ctx,{
type:"line",
data:{
labels:labels,
datasets:[
{
label:"1日平均",
data:moods,
borderWidth:2
},
{
label:"7日移動平均",
data:movingAverage,
borderWidth:2
}
]
},
options:{
scales:{
y:{
min:1,
max:7
}
}
}
});

}

updateDateLabel();
loadEntries();
drawChart();

</script>

</body>
</html>
